<div class="data-table-container">
  <!-- Loading state -->
  <div *ngIf="loading" class="data-table-loading">
    <table class="skeleton-table">
      <thead>
        <tr>
          <th *ngFor="let col of columns">
            <div class="skeleton-cell skeleton-header"></div>
          </th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let row of skeletonRows">
          <td *ngFor="let col of columns">
            <div class="skeleton-cell"></div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Empty state -->
  <div *ngIf="!loading && dataSource.data.length === 0" class="data-table-empty">
    <mat-icon class="data-table-empty__icon">inbox</mat-icon>
    <p class="data-table-empty__message">{{ emptyMessage }}</p>
  </div>

  <!-- Data table -->
  <div *ngIf="!loading && dataSource.data.length > 0" class="data-table-wrapper">
    <table mat-table [dataSource]="dataSource" matSort class="data-table">
      <ng-container *ngFor="let col of columns" [matColumnDef]="col.key">
        <th mat-header-cell *matHeaderCellDef
            [mat-sort-header]="col.sortable ? col.key : ''"
            [disabled]="!col.sortable">
          {{ col.label }}
        </th>
        <td mat-cell *matCellDef="let row">
          <ng-container [ngSwitch]="col.type">
            <boa-money-display *ngSwitchCase="'currency'" [amount]="row[col.key]"></boa-money-display>
            <span *ngSwitchCase="'date'">{{ row[col.key] | date:'mediumDate' }}</span>
            <span *ngSwitchDefault>{{ row[col.key] }}</span>
          </ng-container>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"
          (click)="onRowClick(row)"
          class="data-table__row"
          tabindex="0"></tr>
    </table>

    <mat-paginator
      [pageSize]="pageSize"
      [pageSizeOptions]="pageSizeOptions"
      showFirstLastButtons>
    </mat-paginator>
  </div>
</div>
