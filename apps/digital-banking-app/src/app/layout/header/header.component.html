<mat-toolbar color="primary" class="boa-header">
  <button mat-icon-button (click)="toggleSidenav.emit()" aria-label="Toggle navigation">
    <mat-icon>menu</mat-icon>
  </button>

  <span class="boa-header__logo">Bank of America</span>

  <span class="boa-header__spacer"></span>

  <boa-session-timer></boa-session-timer>

  <button mat-icon-button aria-label="Notifications">
    <mat-icon matBadge="3" matBadgeColor="accent" matBadgeSize="small">notifications</mat-icon>
  </button>

  <button mat-icon-button [matMenuTriggerFor]="userMenu" aria-label="User menu">
    <mat-icon>account_circle</mat-icon>
  </button>

  <mat-menu #userMenu="matMenu">
    <div class="boa-header__user-info" mat-menu-item disabled>
      <mat-icon>person</mat-icon>
      <span>{{ userName }}</span>
    </div>
    <mat-divider></mat-divider>
    <button mat-menu-item routerLink="/profile">
      <mat-icon>settings</mat-icon>
      <span>Profile &amp; Security</span>
    </button>
    <button mat-menu-item (click)="onSignOut()">
      <mat-icon>exit_to_app</mat-icon>
      <span>Sign Out</span>
    </button>
  </mat-menu>
</mat-toolbar>
