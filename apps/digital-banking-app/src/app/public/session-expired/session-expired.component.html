<div class="session-expired-page">
  <div class="session-expired-page__card">
    <mat-icon class="session-expired-page__icon">access_time</mat-icon>
    <h1>Session Expired</h1>
    <p>
      Your session has expired for your security. This happens automatically after
      a period of inactivity to protect your account.
    </p>
    <p class="session-expired-page__secondary">
      Please sign in again to continue using Digital Banking.
    </p>
    <a mat-raised-button color="primary" routerLink="/login" class="session-expired-page__button">
      Return to Sign In
    </a>
  </div>
</div>
