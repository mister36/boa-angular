<div class="transactions-container">
  <h1 class="page-title">Transactions</h1>

  <!-- Error State -->
  <boa-alert-banner
    *ngIf="error"
    type="error"
    [dismissible]="false">
    {{ error }}
  </boa-alert-banner>

  <!-- Filters -->
  <mat-card class="filters-card">
    <mat-card-content>
      <form [formGroup]="filterForm" class="filter-form">
        <mat-form-field appearance="outline" class="search-field">
          <mat-label>Search transactions</mat-label>
          <input matInput formControlName="searchTerm" placeholder="Search by description or merchant...">
          <mat-icon matPrefix>search</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Type</mat-label>
          <mat-select formControlName="type">
            <mat-option [value]="null">All</mat-option>
            <mat-option *ngFor="let t of transactionTypes" [value]="t">
              {{ t | titlecase }}
            </mat-option>
          </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Category</mat-label>
          <mat-select formControlName="category">
            <mat-option [value]="null">All</mat-option>
            <mat-option *ngFor="let c of transactionCategories" [value]="c">
              {{ c | titlecase }}
            </mat-option>
          </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Start Date</mat-label>
          <input matInput [matDatepicker]="startPicker" formControlName="startDate">
          <mat-datepicker-toggle matSuffix [for]="startPicker"></mat-datepicker-toggle>
          <mat-datepicker #startPicker></mat-datepicker>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>End Date</mat-label>
          <input matInput [matDatepicker]="endPicker" formControlName="endDate">
          <mat-datepicker-toggle matSuffix [for]="endPicker"></mat-datepicker-toggle>
          <mat-datepicker #endPicker></mat-datepicker>
        </mat-form-field>

        <div class="filter-actions">
          <button mat-raised-button color="primary" (click)="applyFilters()">Apply</button>
          <button mat-button (click)="clearFilters()">Clear</button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>

  <!-- Transactions Table -->
  <div class="table-section">
    <div class="section-header">
      <span class="result-count" *ngIf="!loading">
        {{ transactions.length }} transaction{{ transactions.length !== 1 ? 's' : '' }}
      </span>
      <button mat-raised-button color="accent" (click)="exportTransactions()">
        <mat-icon>download</mat-icon>
        Export CSV
      </button>
    </div>

    <boa-loading-skeleton
      *ngIf="loading"
      variant="table"
      [rows]="10">
    </boa-loading-skeleton>

    <boa-data-table
      *ngIf="!loading"
      [columns]="tableColumns"
      [data]="transactions"
      [loading]="loading"
      emptyMessage="No transactions match your filters."
      [pageSize]="10"
      [pageSizeOptions]="[5, 10, 25, 50]"
      (rowClick)="onRowClick($event)">
    </boa-data-table>
  </div>
</div>
